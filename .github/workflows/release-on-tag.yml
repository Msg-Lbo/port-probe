name: Build And Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt 5.15.2 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          host: "windows"
          target: "desktop"
          arch: "win64_mingw81"
          tools: "tools_mingw,qt.tools.win64_mingw810"

      - name: Resolve Qt paths
        shell: pwsh
        run: |
          if (-not $env:QT_ROOT_DIR) {
            throw "QT_ROOT_DIR is missing. install-qt-action may have failed."
          }
          $qt5Dir = Join-Path $env:QT_ROOT_DIR "lib/cmake/Qt5"
          $qtBinDir = Join-Path $env:QT_ROOT_DIR "bin"
          $qtBaseDir = Split-Path -Parent (Split-Path -Parent $env:QT_ROOT_DIR)
          $qtToolsDir = Join-Path $qtBaseDir "Tools"
          $gccExe = Get-ChildItem -Path $qtToolsDir -Recurse -Filter "gcc.exe" | Select-Object -First 1
          $gxxExe = Get-ChildItem -Path $qtToolsDir -Recurse -Filter "g++.exe" | Select-Object -First 1
          $mingwMakeExe = Get-ChildItem -Path $qtToolsDir -Recurse -Filter "mingw32-make.exe" | Select-Object -First 1
          if (-not (Test-Path $qt5Dir)) {
            throw "Qt5 cmake dir not found: $qt5Dir"
          }
          if (-not (Test-Path $qtBinDir)) {
            throw "Qt bin dir not found: $qtBinDir"
          }
          if (-not $gccExe) {
            throw "gcc.exe not found under: $qtToolsDir"
          }
          if (-not $gxxExe) {
            throw "g++.exe not found under: $qtToolsDir"
          }
          if (-not $mingwMakeExe) {
            throw "mingw32-make.exe not found under: $qtToolsDir"
          }

          "QT5_DIR=$qt5Dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_BIN_DIR=$qtBinDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GCC_EXE=$($gccExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "GXX_EXE=$($gxxExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MINGW_MAKE_EXE=$($mingwMakeExe.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (CMake)
        shell: pwsh
        run: |
          cmake -S . -B build-qt-x64 -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${env:QT_ROOT_DIR}" -DCMAKE_MAKE_PROGRAM="${env:MINGW_MAKE_EXE}" -DCMAKE_C_COMPILER="${env:GCC_EXE}" -DCMAKE_CXX_COMPILER="${env:GXX_EXE}"

      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build-qt-x64 --config Release

      - name: Pack dist folder
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "packaging/pack.ps1" -Arch x64 -BuildDir "build-qt-x64" -QtBinDir "${env:QT_BIN_DIR}" -Toolchain mingw

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          powershell -NoProfile -ExecutionPolicy Bypass -File "packaging/build-installer.ps1" -Arch x64 -Version $version -IsccPath "C:/Program Files (x86)/Inno Setup 6/ISCC.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PortProbeQt_x64_all_in_one.zip
            installer_output/PortProbeQt_Setup_x64_v*.exe
