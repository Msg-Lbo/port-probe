name: Build And Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Qt 5.15.2 (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"

      - name: Resolve Qt paths
        shell: pwsh
        run: |
          if (-not $env:QT_ROOT_DIR) {
            throw "QT_ROOT_DIR is missing. install-qt-action may have failed."
          }
          $qt5Dir = Join-Path $env:QT_ROOT_DIR "lib/cmake/Qt5"
          $qtBinDir = Join-Path $env:QT_ROOT_DIR "bin"
          if (-not (Test-Path $qt5Dir)) {
            throw "Qt5 cmake dir not found: $qt5Dir"
          }
          if (-not (Test-Path $qtBinDir)) {
            throw "Qt bin dir not found: $qtBinDir"
          }

          "QT5_DIR=$qt5Dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_BIN_DIR=$qtBinDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (CMake)
        shell: pwsh
        run: |
          cmake -S . -B build-qt-x64 -G "Visual Studio 17 2022" -A x64 -DQt5_DIR="${env:QT5_DIR}"

      - name: Build (Release)
        shell: pwsh
        run: |
          cmake --build build-qt-x64 --config Release

      - name: Pack dist folder
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File "packaging/pack.ps1" -Arch x64 -BuildDir "build-qt-x64" -QtBinDir "${env:QT_BIN_DIR}" -Toolchain msvc

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          powershell -NoProfile -ExecutionPolicy Bypass -File "packaging/build-installer.ps1" -Arch x64 -Version $version -IsccPath "C:/Program Files (x86)/Inno Setup 6/ISCC.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PortProbeQt_x64_all_in_one.zip
            installer_output/PortProbeQt_Setup_x64_v*.exe
